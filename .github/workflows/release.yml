name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o harmonclaw-linux-amd64 ./cmd/harmonclaw/
          CGO_ENABLED=0 GOOS=linux GOARCH=riscv64 go build -o harmonclaw-linux-riscv64 ./cmd/harmonclaw/
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o harmonclaw-windows-amd64.exe ./cmd/harmonclaw/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            harmonclaw-linux-amd64
            harmonclaw-linux-riscv64
            harmonclaw-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
