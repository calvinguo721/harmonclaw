<!DOCTYPE html>
<html lang="zh-CN" data-mode="airlock">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HarmonClaw</title>
<style>
:root{
  --bg:#0a0a0c;--surf:#121218;--surf2:#1a1a22;--bdr:#2a2a35;
  --gov:#c43d4a;--gov-glow:rgba(196,61,74,.2);
  --butler:#3d7fc4;--butler-glow:rgba(61,127,196,.2);
  --arch:#3dc46a;--arch-glow:rgba(61,196,106,.2);
  --txt:#e0e0e8;--txt2:#8888a0;--txt3:#505068;
  --ease:.35s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI","Noto Sans SC",-apple-system,sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
button:active{transform:scale(.96)}
input,textarea{border:none;outline:none;background:none;color:inherit;font:inherit;resize:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

/* ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ Top Status Bar ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  height:40px;padding:0 1rem;background:var(--surf);border-bottom:1px solid var(--bdr);
}
.topbar-left{display:flex;align-items:center;gap:1rem}
.token-wrap{display:flex;align-items:center;gap:.3rem}
.token-in{width:140px;padding:.2rem .4rem;font-size:.62rem;background:var(--surf2);border:1px solid var(--bdr);border-radius:4px}
.token-in::placeholder{color:var(--txt3)}
.btn-token{padding:.2rem .5rem;font-size:.6rem;background:var(--surf2);border:1px solid var(--bdr);border-radius:4px;color:var(--txt2)}
.btn-token:hover{color:var(--arch)}
.health-dot{width:8px;height:8px;border-radius:50%;background:var(--txt3)}
.health-dot.ok{background:var(--arch);box-shadow:0 0 8px var(--arch)}
.health-dot.err{background:var(--gov);box-shadow:0 0 8px var(--gov)}
.topbar-ver{font-size:.7rem;color:var(--txt2);letter-spacing:.05em}
.sov-sw{display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--bdr)}
.sv{padding:.25rem .8rem;font-size:.62rem;font-weight:700;letter-spacing:.06em;color:var(--txt2);transition:all .2s}
.sv.active{color:#fff}
.sv-s.active{background:#c43d4a}
.sv-a.active{background:#3d7fc4}
.sv-o.active{background:#3dc46a}

/* ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ Shell: Three Columns ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ */
.shell{display:flex;flex:1;height:calc(100vh - 40px);min-height:0}
@media(max-width:900px){.shell{flex-direction:column}}

/* ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ Left: Governor (Red) ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ */
.gov{
  width:200px;min-width:200px;display:flex;flex-direction:column;
  border-right:1px solid var(--bdr);background:linear-gradient(180deg,var(--surf) 0%,#1a1214 100%);
}
@media(max-width:900px){.gov{width:100%;min-width:0;border-right:none;border-bottom:1px solid var(--bdr)}}
.gov-header{padding:.8rem 1rem;display:flex;align-items:center;gap:.5rem;border-bottom:1px solid var(--bdr)}
.gov-dot{width:8px;height:8px;border-radius:50%;background:var(--gov);box-shadow:0 0 6px var(--gov);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.gov-title{font-size:.6rem;letter-spacing:.12em;color:var(--gov);text-transform:uppercase}
.gov-body{flex:1;overflow-y:auto;padding:.5rem}
.stat-row{display:flex;justify-content:space-between;padding:.4rem .5rem;margin-bottom:.2rem;background:var(--surf2);border-radius:6px}
.stat-k{font-size:.58rem;color:var(--txt2);text-transform:uppercase}
.stat-v{font-size:.75rem;font-weight:700;color:var(--gov)}
.ledger-title{font-size:.55rem;color:var(--txt3);padding:.5rem 0 .25rem;text-transform:uppercase}
.ledger-list{display:flex;flex-direction:column;gap:.2rem}
.le{font-size:.62rem;font-family:monospace;padding:.3rem .4rem;border-radius:4px;background:var(--surf2);border-left:3px solid var(--bdr)}
.le[data-s="ok"],.le[data-s="success"]{border-left-color:var(--arch)}
.le[data-s="fail"]{border-left-color:var(--gov)}
.le span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ Center: Butler (Blue) ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ */
.butler{flex:1;display:flex;flex-direction:column;min-width:0;background:linear-gradient(180deg,var(--surf) 0%,#12181a 100%)}
.butler-header{padding:0 1rem;height:48px;display:flex;align-items:center;border-bottom:1px solid var(--bdr)}
.butler-brand h1{font-size:.85rem;letter-spacing:.1em;color:var(--butler)}
.chat-body{flex:1;overflow-y:auto;padding:1rem}
.chat-flow{display:flex;flex-direction:column;gap:.5rem;max-width:680px;margin:0 auto}
.msg{max-width:82%;padding:.6rem 1rem;font-size:.85rem;line-height:1.55;word-break:break-word;border-radius:12px;animation:msgIn .2s ease}
.msg-user{align-self:flex-end;background:var(--butler);color:#fff;border-bottom-right-radius:4px}
.msg-ai{align-self:flex-start;background:var(--surf2);border:1px solid var(--bdr);border-bottom-left-radius:4px}
.msg-cursor{display:inline-block;width:2px;height:1em;background:var(--butler);animation:blink .6s infinite;vertical-align:text-bottom;margin-left:2px}
.msg-id{font-size:.6rem;color:var(--txt3);margin-top:.3rem;cursor:pointer;text-decoration:underline}
.msg-id:hover{color:var(--butler)}
.trace-panel{position:fixed;inset:20%;background:var(--surf);border:2px solid var(--bdr);border-radius:12px;z-index:100;padding:1rem;overflow:auto;display:none}
.trace-panel.show{display:block}
.trace-close{float:right;cursor:pointer;font-size:1.2rem}
.trace-chain{font-family:monospace;font-size:.7rem;margin-top:.5rem}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes blink{50%{opacity:0}}
.chat-bar{display:flex;gap:.5rem;padding:.6rem 1rem;border-top:1px solid var(--bdr)}
.chat-in{flex:1;padding:.5rem .8rem;border-radius:8px;font-size:.85rem;background:var(--bg);border:1px solid var(--bdr)}
.chat-in:focus{border-color:var(--butler)}
.btn-send{padding:.45rem 1.2rem;border-radius:8px;font-size:.75rem;font-weight:700;background:var(--butler);color:#fff}
.btn-send:disabled{opacity:.4;cursor:default}

/* ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ Right: Architect (Green) ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ */
.arch{width:260px;min-width:260px;display:flex;flex-direction:column;border-left:1px solid var(--bdr);background:linear-gradient(180deg,var(--surf) 0%,#121a14 100%)}
@media(max-width:900px){.arch{width:100%;min-width:0;border-left:none;border-top:1px solid var(--bdr)}}
.arch-header{padding:.6rem .8rem;font-size:.58rem;letter-spacing:.1em;color:var(--arch);text-transform:uppercase;border-bottom:1px solid var(--bdr)}
.arch-body{flex:1;overflow-y:auto;padding:.5rem}
.skill-list{display:flex;flex-direction:column;gap:.25rem}
.btn-skill{padding:.4rem .6rem;border-radius:6px;font-size:.7rem;text-align:left;background:var(--surf2);color:var(--txt2);border:1px solid transparent;transition:all .15s}
.btn-skill:hover{background:var(--arch-glow);color:var(--arch);border-color:var(--arch)}
.arch-log{font-family:monospace;font-size:.65rem;line-height:1.6;color:var(--txt2);white-space:pre-wrap;word-break:break-all;margin-top:.5rem;padding:.4rem;background:var(--bg);border-radius:6px;max-height:120px;overflow-y:auto}
.t-ok{color:var(--arch)}.t-err{color:var(--gov)}.t-p{color:var(--butler)}
.arch-bar{display:flex;gap:.3rem;padding:.4rem .5rem;border-top:1px solid var(--bdr)}
.arch-in{flex:1;padding:.3rem .5rem;border-radius:5px;font-size:.68rem;font-family:monospace;background:var(--bg);border:1px solid var(--bdr)}
.arch-in:focus{border-color:var(--arch)}
.btn-ex{padding:.3rem .6rem;border-radius:5px;font-size:.65rem;font-weight:700;background:var(--arch);color:var(--bg)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="health-dot" id="healthDot"></div>
    <span class="topbar-ver" id="version">ŌĆö</span>
    <div class="token-wrap">
      <input class="token-in" id="tokenIn" placeholder="Token (Bearer)" type="password" autocomplete="off">
      <button class="btn-token" id="btnToken" title="Get token">Get</button>
    </div>
  </div>
  <div class="sov-sw">
    <button class="sv sv-s" data-m="shadow">SHADOW</button>
    <button class="sv sv-a active" data-m="airlock">AIRLOCK</button>
    <button class="sv sv-o" data-m="opensea">OPENSEA</button>
  </div>
</div>

<div class="shell">
  <aside class="gov">
    <div class="gov-header"><div class="gov-dot"></div><span class="gov-title">Governor</span></div>
    <div class="gov-body">
      <div class="stat-row"><span class="stat-k">Mode</span><span class="stat-v" id="sMode">AIRLOCK</span></div>
      <div class="stat-row"><span class="stat-k">Health</span><span class="stat-v" id="sHealth">ŌĆö</span></div>
      <div class="ledger-title">Ledger</div>
      <div class="ledger-list" id="ledger"></div>
    </div>
  </aside>

  <main class="butler">
    <div class="butler-header"><h1 class="butler-brand">Butler / Life</h1></div>
    <div class="chat-body" id="chatBody">
      <div class="chat-flow" id="chatFlow"></div>
    </div>
    <div class="chat-bar">
      <input class="chat-in" id="chatIn" placeholder="Say something..." autocomplete="off">
      <button class="btn-send" id="btnSend">SEND</button>
    </div>
  </main>

  <aside class="arch">
    <div class="arch-header">Architect / Skills</div>
    <div class="arch-body">
      <div class="skill-list" id="skillList"></div>
      <div class="arch-log" id="archLog"><span class="t-p">hclaw&gt;</span> ready</div>
    </div>
    <div class="arch-bar">
      <input class="arch-in" id="archIn" placeholder="skill_id or text..." autocomplete="off">
      <button class="btn-ex" id="btnEx">EXEC</button>
    </div>
  </aside>
</div>

<div class="trace-panel" id="tracePanel">
  <span class="trace-close" id="traceClose">&times;</span>
  <div id="traceContent"></div>
</div>

<script>
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
let history=[],busy=false,prevLedgerHash='';

const chatFlow=$('#chatFlow'),chatBody=$('#chatBody'),chatIn=$('#chatIn'),btnSend=$('#btnSend'),
      ledger=$('#ledger'),skillList=$('#skillList'),archLog=$('#archLog'),archIn=$('#archIn'),
      sMode=$('#sMode'),sHealth=$('#sHealth'),healthDot=$('#healthDot'),version=$('#version'),tokenIn=$('#tokenIn');

const TOKEN_KEY='harmonclaw_token';
function getToken(){return localStorage.getItem(TOKEN_KEY)||''}
function setToken(t){localStorage.setItem(TOKEN_KEY,t||'');tokenIn.value=t||''}
function authHeaders(){
  const t=getToken();
  const h={'Content-Type':'application/json'};
  if(t)h['Authorization']='Bearer '+t;
  return h;
}
tokenIn.value=getToken();
tokenIn.addEventListener('change',()=>setToken(tokenIn.value.trim()));
tokenIn.addEventListener('blur',()=>setToken(tokenIn.value.trim()));
$('#btnToken').addEventListener('click',async()=>{
  try{
    const r=await fetch('/v1/token',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    const d=await r.json();
    if(r.ok&&d.token){setToken(d.token);tokenIn.type='text';setTimeout(()=>tokenIn.type='password',2000)}
    else{alert(d.error||'Failed')}
  }catch(e){alert(e.message)}
});

/* Sovereignty (UI only) */
$$('.sv').forEach(b=>b.addEventListener('click',()=>{
  $$('.sv').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  const m=b.dataset.m;
  document.documentElement.setAttribute('data-mode',m);
  sMode.textContent=m.toUpperCase();
}));

/* Health + Version */
async function refreshHealth(){
  try{
    const r=await fetch('/v1/health',{headers:authHeaders()});
    const d=await r.json();
    const ok=d.overall==='healthy';
    healthDot.className='health-dot '+(ok?'ok':'err');
    sHealth.textContent=ok?'OK':'DEGRADED';
    version.textContent=d.version||'ŌĆö';
    if(Array.isArray(d.architect?.registered_skills)){
      renderSkills(d.architect.registered_skills);
    }
  }catch(_){healthDot.className='health-dot err';sHealth.textContent='OFF'}
}
function renderSkills(skills){
  skillList.innerHTML='';
  (skills||[]).forEach(sk=>{
    const b=document.createElement('button');
    b.className='btn-skill';b.textContent=sk;b.dataset.sk=sk;
    b.addEventListener('click',()=>{archIn.value=sk;execSkill()});
    skillList.appendChild(b);
  });
}
setInterval(refreshHealth,4000);refreshHealth();

/* Chat */
chatIn.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
btnSend.addEventListener('click',send);

async function send(){
  const t=chatIn.value.trim();
  if(!t||busy)return;
  busy=true;btnSend.disabled=true;chatIn.value='';
  addBubble('user',t);
  history.push({role:'user',content:t});
  const el=addBubble('ai','');
  const cur=document.createElement('span');
  cur.className='msg-cursor';el.appendChild(cur);

  try{
    const r=await fetch('/v1/chat/completions',{
      method:'POST',headers:authHeaders(),
      body:JSON.stringify({messages:history})
    });
    const d=await r.json();
    if(!r.ok){cur.remove();el.textContent='[Error] '+(d.error||r.statusText);return}
    const c=d.choices?.[0]?.message?.content||'(empty)';
    const aid=d.action_id||'';
    history.push({role:'assistant',content:c});
    await typeOut(el,c,cur,aid);
  }catch(e){cur.remove();el.textContent='[Network] '+e.message}
  finally{busy=false;btnSend.disabled=false}
}

function addBubble(role,text){
  const el=document.createElement('div');
  el.className='msg msg-'+role;
  el.textContent=text;
  chatFlow.appendChild(el);
  chatBody.scrollTop=chatBody.scrollHeight;
  return el;
}

async function typeOut(el,text,cur,actionId){
  el.textContent='';
  const sp=Math.max(4,Math.min(25,800/text.length));
  for(let i=0;i<text.length;i++){
    el.textContent+=text[i];
    el.appendChild(cur);
    chatBody.scrollTop=chatBody.scrollHeight;
    if(i%2===0)await new Promise(r=>setTimeout(r,sp));
  }
  cur.remove();
  if(actionId){
    const idEl=document.createElement('div');
    idEl.className='msg-id';
    idEl.textContent='#'+actionId;
    idEl.title='Click to trace';
    idEl.onclick=()=>showTrace(actionId);
    el.appendChild(idEl);
  }
}

async function showTrace(actionId){
  try{
    const r=await fetch('/v1/ledger/trace?action_id='+encodeURIComponent(actionId),{headers:authHeaders()});
    const d=await r.json();
    const panel=$('#tracePanel');
    const content=$('#traceContent');
    if(r.ok&&d.chain){
      content.innerHTML='<strong>Trace: '+esc(actionId)+'</strong><pre class="trace-chain">'+esc(JSON.stringify(d.chain,null,2))+'</pre>';
    }else{content.innerHTML='<span class="t-err">'+esc(d.error||'No trace')+'</span>'}
    panel.classList.add('show');
  }catch(e){$('#traceContent').innerHTML='<span class="t-err">'+esc(e.message)+'</span>';$('#tracePanel').classList.add('show')}
}
$('#traceClose').addEventListener('click',()=>$('#tracePanel').classList.remove('show'));

/* Ledger */
async function pollLedger(){
  try{
    const r=await fetch('/v1/ledger/latest',{headers:authHeaders()});
    if(!r.ok)return;
    const entries=await r.json();
    if(!Array.isArray(entries))return;
    const hash=JSON.stringify(entries);
    if(hash!==prevLedgerHash){renderLedger(entries);prevLedgerHash=hash}
  }catch(_){}
}
function renderLedger(entries){
  ledger.innerHTML='';
  entries.slice(-12).forEach(e=>{
    const d=document.createElement('div');
    d.className='le';d.setAttribute('data-s',e.result||'ok');
    const ts=e.timestamp?e.timestamp.substring(11,19):'--:--';
    d.innerHTML='<span>'+ts+' '+esc(e.action_type||'-')+'</span><span>'+esc(e.result||'-')+'</span>';
    ledger.appendChild(d);
  });
}
setInterval(pollLedger,2500);pollLedger();

/* Skill Execute */
$('#btnEx').addEventListener('click',execSkill);
archIn.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();execSkill()}});

async function execSkill(){
  const sk=archIn.value.trim();
  if(!sk)return;
  archIn.value='';
  tlog('<span class="t-p">hclaw&gt;</span> exec '+esc(sk));
  try{
    const r=await fetch('/v1/skills/execute',{
      method:'POST',headers:authHeaders(),
      body:JSON.stringify({skill_id:sk,skill_name:sk,text:sk,input:sk})
    });
    const d=await r.json();
    if(r.status===403){
      tlog('<span class="t-err">[BLOCKED] '+esc(d.reason||d.error||'')+'</span>');
    }else if(r.ok){
      tlog('<span class="t-ok">[OK] '+esc(d.status||'')+' '+esc(JSON.stringify(d).slice(0,80))+'</span>');
    }else{tlog('<span class="t-err">[ERR] '+esc(d.error||r.statusText)+'</span>')}
  }catch(e){tlog('<span class="t-err">[NET] '+esc(e.message)+'</span>')}
}

function tlog(h){archLog.innerHTML+='\n'+h;archLog.scrollTop=archLog.scrollHeight}
function esc(s){const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
</script>
</body>
</html>
