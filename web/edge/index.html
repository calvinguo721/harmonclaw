<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HC Edge</title>
<style>
:root{--bg:#1a1a2e;--surf:#16213e;--accent:#0f3460;--hl:#e94560;--txt:#eee;--muted:#888}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;font-size:14px}
.layout{display:flex;height:100vh}
.side{width:140px;min-width:140px;background:var(--surf);border-right:1px solid var(--accent);overflow-y:auto;padding:.4rem}
.side h3{font-size:.7rem;color:var(--muted);margin-bottom:.3rem;text-transform:uppercase}
.mem-item{font-size:.75rem;padding:.2rem .3rem;cursor:pointer;border-radius:4px;margin-bottom:.1rem}
.mem-item:hover{background:var(--accent)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat{flex:1;overflow-y:auto;padding:.5rem}
.msg{max-width:85%;padding:.4rem .8rem;margin:.3rem 0;border-radius:10px;word-break:break-word;font-size:.9rem}
.msg-u{background:var(--accent);margin-left:auto;color:#fff}
.msg-a{background:var(--surf);border:1px solid var(--accent)}
.bar{display:flex;gap:.4rem;padding:.4rem;border-top:1px solid var(--accent);align-items:flex-end}
.bar-in{flex:1;padding:.4rem .6rem;background:var(--surf);border:1px solid var(--accent);border-radius:6px;color:var(--txt);font-size:.9rem;resize:none;min-height:36px;max-height:80px}
.bar-in:focus{outline:none;border-color:var(--hl)}
.btn-send{padding:.4rem 1rem;background:var(--hl);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600}
.btn-send:disabled{opacity:.5;cursor:default}
.foot{display:flex;gap:1rem;padding:.2rem .5rem;font-size:.65rem;color:var(--muted);background:var(--surf);border-top:1px solid var(--accent)}
.blocked{position:fixed;inset:0;background:#c00;color:#fff;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:9999;font-size:2rem;font-weight:700}
.blocked.show{display:flex}
</style>
</head>
<body>
<div class="blocked" id="blocked"><div>403 BLOCKED</div><div style="font-size:1rem;margin-top:.5rem">Sovereignty violation</div></div>
<div class="layout">
<div class="side"><h3>记忆</h3><div id="memTree"></div></div>
<div class="main">
<div class="chat" id="chat"></div>
<div class="bar"><textarea class="bar-in" id="input" placeholder="输入消息 (Enter发送)" rows="1"></textarea><button class="btn-send" id="send">发送</button></div>
</div>
</div>
<div class="foot"><span id="conn">🔴 离线</span><span>Orange Pi RV2 · RISC-V · Ky X1</span><span id="metrics">—</span><span id="sov">—</span></div>
<script>
const chat=document.getElementById('chat'),input=document.getElementById('input'),send=document.getElementById('send'),memTree=document.getElementById('memTree'),conn=document.getElementById('conn'),metrics=document.getElementById('metrics'),sov=document.getElementById('sov'),blocked=document.getElementById('blocked');
let sessionId='edge-'+Date.now(),connected=false;
function addMsg(role,text){const d=document.createElement('div');d.className='msg msg-'+(role==='user'?'u':'a');d.textContent=text;chat.appendChild(d);chat.scrollTop=chat.scrollHeight;return d;}
function appendToMsg(el,chunk){el.textContent+=chunk;chat.scrollTop=chat.scrollHeight;}
function memAdd(sid,preview){const e=document.createElement('div');e.className='mem-item';e.textContent=preview||sid;e.onclick=()=>{sessionId=sid};memTree.appendChild(e);}
function checkHealth(){fetch('/health').then(r=>r.json()).then(d=>{connected=d.connected;conn.textContent=connected?'🟢 在线':'🔴 离线';sov.textContent=d.backend?'airlock':'—';}).catch(()=>{connected=false;conn.textContent='🔴 离线';});}
function sendMsg(){
 const t=input.value.trim();if(!t)return;
 addMsg('user',t);input.value='';send.disabled=true;
 fetch('/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:t}],stream:true})}).then(r=>{
  if(r.status===403){blocked.classList.add('show');send.disabled=false;return;}
  if(!r.ok){addMsg('a','请求失败');send.disabled=false;return;}
  const reader=r.body.getReader();const dec=new TextDecoder();let buf='',msgEl=addMsg('a','');
  function read(){reader.read().then(({done,value})=>{
   if(done){send.disabled=false;return;}
   buf+=dec.decode(value,{stream:true});
   const lines=buf.split('\n');buf=lines.pop()||'';
   for(const l of lines){if(l.startsWith('data: ')){const d=l.slice(6);if(d==='[DONE]')break;try{const j=JSON.parse(d);const c=j.choices?.[0]?.delta?.content;if(c)appendToMsg(msgEl,c);}catch(e){}}}
   read();
  });}
  read();
 }).catch(()=>{addMsg('a','网络错误');send.disabled=false;});
}
input.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}};
send.onclick=sendMsg;
checkHealth();setInterval(checkHealth,10000);
fetch('/api/cache').then(r=>r.json()).then(arr=>{arr.forEach(x=>memAdd(x.session_id,x.content?.slice(0,20)));}).catch(()=>{});
</script>
</body></html>
